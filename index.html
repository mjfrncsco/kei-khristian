<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <div class="overlay"></div>

    <main class="home">

        <div class="title">
            <p class="subtitle" id="typing-subtitle"></p>
            <h1 id="typing-name"></h1>
        </div>

        <div class="envelope-wrapper">

            <img
                src="images/envelope.png"
                alt="Wedding Envelope"
                class="envelope"
            >

            <button
                class="seal-button"
                id="seal"
                aria-label="Open Invitation"
            >
                <img
                    src="images/wax-sealed.png"
                    alt="Wax Seal"
                    class="seal"
                >
            </button>

        </div>

        <p class="tap">
            Open the Invitation
        </p>

    </main>

    <script src="script.js"></script>

</body>

</html>
